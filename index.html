<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ShmetAi · dark emerald</title>
    <!-- Google Fonts: Orbitron + Syne -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #07070f;
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            color: #ffffff;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 136, 0.12);
            border-radius: 44px;
            box-shadow: 0 30px 50px -20px #00000080;
            padding: 20px 18px 25px;
            transition: all 0.2s;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .project-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 34px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #d0ffd0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            letter-spacing: -0.5px;
        }

        .status-badge {
            background: #0f0f17;
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
            font-size: 13px;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ===== AUTH ===== */
        .auth-section {
            background: rgba(10, 10, 18, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 255, 136, 0.1);
            border-radius: 34px;
            padding: 22px 18px;
            margin-bottom: 20px;
        }

        .toggle-btns {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px;
            border-radius: 50px;
        }

        .toggle-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            color: #a0aabf;
            cursor: pointer;
            font-family: 'Syne', sans-serif;
            transition: 0.2s;
        }

        .toggle-btn.active {
            background: #00ff88;
            color: #07070f;
            font-weight: 700;
            box-shadow: 0 0 12px #00ff8866;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .auth-input {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 40px;
            padding: 16px 22px;
            font-size: 16px;
            outline: none;
            color: white;
            font-family: 'Syne', sans-serif;
        }

        .auth-input::placeholder {
            color: #7f8b9f;
        }

        .auth-input:focus {
            border-color: #00ff88;
            box-shadow: 0 0 0 4px rgba(0, 255, 136, 0.15);
        }

        .auth-button {
            background: #00ff88;
            border: none;
            border-radius: 40px;
            padding: 16px;
            color: #07070f;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            font-family: 'Syne', sans-serif;
            transition: 0.15s;
        }

        .auth-button:hover {
            background: #70ffb0;
            box-shadow: 0 8px 18px -6px #00ff88;
        }

        .user-info-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 50px;
            padding: 10px 20px;
            margin-bottom: 20px;
            font-weight: 500;
            color: #fff;
        }

        .logout-btn {
            background: none;
            border: 1.5px solid #00ff88;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: #00ff88;
            font-family: 'Syne', sans-serif;
        }

        /* ===== ЧАТЫ КОМПАКТНЕЕ ===== */
        .chats-sidebar {
            background: rgba(10, 10, 18, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 136, 0.1);
            border-radius: 24px;
            padding: 12px 12px;
            margin-bottom: 15px;
            max-height: 120px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #00ff88 #1a1a2a;
        }

        .chats-sidebar::-webkit-scrollbar {
            width: 4px;
        }
        .chats-sidebar::-webkit-scrollbar-track {
            background: #1a1a2a;
        }
        .chats-sidebar::-webkit-scrollbar-thumb {
            background: #00ff88;
            border-radius: 8px;
        }

        .chats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            color: #00ff88;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .new-chat-btn {
            background: #00ff88;
            color: #07070f;
            border: none;
            padding: 5px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
        }

        .chat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            margin-bottom: 5px;
            cursor: pointer;
            border-left: 3px solid transparent;
            color: #ddd;
        }

        .chat-item.active-chat {
            background: rgba(0, 255, 136, 0.05);
            border-left: 3px solid #00ff88;
            color: white;
            font-weight: 500;
        }

        .delete-chat-btn {
            background: none;
            border: none;
            color: #ff5f6d;
            font-size: 18px;
            cursor: pointer;
            opacity: 0.7;
        }

        /* ===== MODE PILL (переключатель) ===== */
        .mode-selector {
            display: flex;
            gap: 0;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 136, 0.15);
            border-radius: 60px;
            padding: 4px;
            margin: 15px 0;
        }

        .mode-btn {
            flex: 1;
            background: transparent;
            border: none;
            border-radius: 60px;
            padding: 12px 0;
            font-weight: 600;
            color: #aaa;
            font-family: 'Syne', sans-serif;
            cursor: pointer;
            transition: 0.15s;
        }

        .mode-btn.active-mode {
            background: #00ff88;
            color: #07070f;
            font-weight: 700;
            box-shadow: 0 0 12px #00ff8866;
        }

        /* ===== ЧАТ ОКНО ===== */
        .chat-window {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0, 255, 136, 0.1);
            border-radius: 24px;
            padding: 20px 16px;
            margin: 10px 0 20px;
            max-height: 380px;
            min-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        /* пустой плейсхолдер */
        .chat-window:empty::before {
            content: "💬 Начни разговор...";
            color: #5f6b80;
            font-style: italic;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: 16px;
            opacity: 0.7;
        }

        /* анимация сообщений */
        @keyframes fadeSlideIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .message {
            max-width: 85%;
            padding: 14px 20px;
            border-radius: 28px;
            font-size: 15px;
            line-height: 1.45;
            word-break: break-word;
            animation: fadeSlideIn 0.25s ease-out;
            font-family: 'Syne', sans-serif;
        }

        .user-message {
            align-self: flex-end;
            background: #00ff88;
            color: #07070f;
            font-weight: 500;
            border-bottom-right-radius: 6px;
        }

        .ai-message {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(0, 255, 136, 0.15);
            color: #ffffff;
            border-bottom-left-radius: 6px;
        }

        /* ===== INPUT AREA (textarea) ===== */
        .input-area {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 40px;
            padding: 6px 6px 6px 22px;
            transition: 0.15s;
        }

        .input-area:focus-within {
            border-color: #00ff88;
            box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.15);
        }

        .chat-input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 16px 0 12px 0;
            font-size: 16px;
            outline: none;
            color: white;
            font-family: 'Syne', sans-serif;
            resize: none;
            max-height: 100px;
            line-height: 1.4;
        }

        .chat-input::placeholder {
            color: #6a758b;
        }

        .photo-upload-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(0, 255, 136, 0.3);
            width: 48px;
            height: 48px;
            border-radius: 40px;
            color: #00ff88;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .send-btn {
            background: #00ff88;
            border: none;
            width: 54px;
            height: 54px;
            border-radius: 40px;
            color: #07070f;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
            flex-shrink: 0;
            line-height: 0;
        }

        /* typing indicator (точки) */
        .typing-indicator {
            align-self: flex-start;
            background: rgba(30, 30, 40, 0.7);
            border: 1px solid rgba(0, 255, 136, 0.2);
            padding: 14px 22px;
            border-radius: 28px;
            color: #00ff88;
            display: flex;
            align-items: center;
            gap: 6px;
            font-style: normal;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* подпись */
        .footnote {
            text-align: center;
            color: #6a758b;
            font-size: 12px;
            margin-top: 16px;
            letter-spacing: 0.3px;
        }

        .hidden { display: none !important; }

        /* мобильная адаптация */
        @media (max-width: 500px) {
            body { padding: 0; }
            .app-container { 
                max-width: 100%; 
                border-radius: 0; 
                min-height: 100dvh; 
                padding: 15px 12px 20px;
                border: none;
                border-left: 1px solid rgba(0,255,136,0.1);
                border-right: 1px solid rgba(0,255,136,0.1);
            }
            .chat-window { max-height: 60dvh; }
        }

        /* фото-превью (если добавится) */
        .image-preview {
            max-width: 100px;
            border-radius: 16px;
            border: 1px solid #00ff88;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <span class="project-name">ShmetAi</span>
        <span class="status-badge" id="statusBadge">⚡ быстрый</span>
    </div>

    <!-- АВТОРИЗАЦИЯ -->
    <div id="authBlock" class="auth-section">
        <div class="toggle-btns">
            <button class="toggle-btn active" id="btnLoginTab">Вход</button>
            <button class="toggle-btn" id="btnRegTab">Регистрация</button>
        </div>
        <div id="loginForm" class="auth-form">
            <input type="text" class="auth-input" id="loginIdentifier" placeholder="Логин или почта">
            <input type="password" class="auth-input" id="loginPassword" placeholder="Пароль (6 цифр)" maxlength="6">
            <button class="auth-button" id="loginAction">Войти</button>
        </div>
        <div id="registerForm" class="auth-form hidden">
            <input type="text" class="auth-input" id="regEmail" placeholder="Электронная почта">
            <input type="text" class="auth-input" id="regLogin" placeholder="Логин">
            <input type="password" class="auth-input" id="regPassword" placeholder="6 цифр" maxlength="6">
            <button class="auth-button" id="registerAction">Создать</button>
        </div>
    </div>

    <!-- ПАНЕЛЬ ПОЛЬЗОВАТЕЛЯ -->
    <div id="userPanel" class="user-info-bar hidden">
        <span id="displayUser">user</span>
        <button class="logout-btn" id="logoutBtn">Выйти</button>
    </div>

    <!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
    <div id="mainApp" class="hidden">
        <!-- Список чатов (компактный) -->
        <div class="chats-sidebar" id="chatsSidebar">
            <div class="chats-header">
                <span>📋 Мои чаты</span>
                <button class="new-chat-btn" id="newChatBtn">+ Новый чат</button>
            </div>
            <div id="chatsList"></div>
        </div>

        <!-- режимы: pill -->
        <div class="mode-selector">
            <button class="mode-btn active-mode" id="modeChat">💬 Общение</button>
            <button class="mode-btn" id="modeSearch">🌐 Поиск</button>
        </div>

        <!-- окно чата (при отсутствии сообщений покажет плейсхолдер) -->
        <div class="chat-window" id="chatWindow"></div>

        <!-- поле ввода (textarea) -->
        <div class="input-area">
            <textarea class="chat-input" id="userInput" placeholder="Напиши мне..." rows="1"></textarea>
            <button class="photo-upload-btn" id="photoUploadBtn">📷</button>
            <input type="file" id="photoInput" accept="image/*" style="display: none;">
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
        <div class="footnote" id="modeHint">ShmetAi by Veltrix App</div>
    </div>
</div>

<script>
    (function() {
        // ========== ХРАНИЛИЩЕ ==========
        const STORAGE_KEY = 'shmetai_users';
        const SESSION_KEY = 'shmetai_session';
        const CHATS_KEY = 'shmetai_chats';
        let usersDB = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        if (usersDB.length === 0) {
            usersDB.push({ email: 'demo@shmet.ai', login: 'demo', password: '123456' });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(usersDB));
        }
        let currentSession = JSON.parse(localStorage.getItem(SESSION_KEY)) || null;
        
        // ========== ЧАТЫ ==========
        let chats = JSON.parse(localStorage.getItem(CHATS_KEY)) || {};
        let currentChatId = null;
        let currentMode = 'chat';

        // ========== DOM ==========
        const authBlock = document.getElementById('authBlock');
        const userPanel = document.getElementById('userPanel');
        const mainApp = document.getElementById('mainApp');
        const displayUserSpan = document.getElementById('displayUser');
        const statusBadge = document.getElementById('statusBadge');
        const btnLoginTab = document.getElementById('btnLoginTab');
        const btnRegTab = document.getElementById('btnRegTab');
        const loginFormDiv = document.getElementById('loginForm');
        const registerFormDiv = document.getElementById('registerForm');
        const loginIdentifier = document.getElementById('loginIdentifier');
        const loginPassword = document.getElementById('loginPassword');
        const loginAction = document.getElementById('loginAction');
        const regEmail = document.getElementById('regEmail');
        const regLogin = document.getElementById('regLogin');
        const regPassword = document.getElementById('regPassword');
        const registerAction = document.getElementById('registerAction');
        const logoutBtn = document.getElementById('logoutBtn');
        const modeChatBtn = document.getElementById('modeChat');
        const modeSearchBtn = document.getElementById('modeSearch');
        const modeHint = document.getElementById('modeHint');
        const chatWindow = document.getElementById('chatWindow');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const photoUploadBtn = document.getElementById('photoUploadBtn');
        const photoInput = document.getElementById('photoInput');
        const newChatBtn = document.getElementById('newChatBtn');
        const chatsList = document.getElementById('chatsList');

        const SYSTEM_PROMPT = {
            role: 'system',
            content: 'Ты ShmetAi -- дружелюбный, живой ассистент. Отвечай кратко (1-3 предложения), используй эмодзи, будь слегка эмоциональным. У тебя есть память на этот диалог. Пиши на русском.'
        };

        // ========== УПРАВЛЕНИЕ ЧАТАМИ ==========
        function initUserChats() {
            if (!currentSession) return;
            const userLogin = currentSession.userLogin;
            if (!chats[userLogin]) {
                const firstChatId = Date.now().toString();
                chats[userLogin] = [{
                    id: firstChatId,
                    name: 'Чат 1',
                    messages: [{ role: 'assistant', content: 'Привет! Я ShmetAi, у меня есть память и эмоции 😊' }],
                    created: Date.now()
                }];
                currentChatId = firstChatId;
            } else {
                currentChatId = chats[userLogin][0]?.id || null;
            }
            saveChats();
            renderChatsList();
            loadCurrentChat();
        }

        function saveChats() {
            localStorage.setItem(CHATS_KEY, JSON.stringify(chats));
        }

        function renderChatsList() {
            if (!currentSession) return;
            const userChats = chats[currentSession.userLogin] || [];
            chatsList.innerHTML = userChats.map(chat => `
                <div class="chat-item ${chat.id === currentChatId ? 'active-chat' : ''}" data-chat-id="${chat.id}">
                    <span>${chat.name}</span>
                    <button class="delete-chat-btn" onclick="event.stopPropagation(); deleteChat('${chat.id}')">✕</button>
                </div>
            `).join('');
            
            document.querySelectorAll('.chat-item').forEach(item => {
                item.addEventListener('click', () => switchChat(item.dataset.chatId));
            });
        }

        function switchChat(chatId) {
            currentChatId = chatId;
            renderChatsList();
            loadCurrentChat();
        }

        function loadCurrentChat() {
            if (!currentSession || !currentChatId) return;
            const userChats = chats[currentSession.userLogin] || [];
            const currentChat = userChats.find(c => c.id === currentChatId);
            if (currentChat) {
                chatWindow.innerHTML = '';
                currentChat.messages.forEach(msg => {
                    addMessageToChat(msg.content, msg.role === 'user' ? 'user' : 'ai');
                });
                scrollToBottom();
            }
        }

        function addMessageToCurrentChat(role, content) {
            if (!currentSession || !currentChatId) return;
            const userChats = chats[currentSession.userLogin] || [];
            const chatIndex = userChats.findIndex(c => c.id === currentChatId);
            if (chatIndex !== -1) {
                userChats[chatIndex].messages.push({ role, content });
                saveChats();
            }
        }

        window.deleteChat = function(chatId) {
            if (!currentSession) return;
            const userLogin = currentSession.userLogin;
            const userChats = chats[userLogin] || [];
            if (userChats.length <= 1) {
                alert('Нельзя удалить единственный чат');
                return;
            }
            chats[userLogin] = userChats.filter(c => c.id !== chatId);
            if (currentChatId === chatId) {
                currentChatId = chats[userLogin][0].id;
            }
            saveChats();
            renderChatsList();
            loadCurrentChat();
        };

        // ========== UI ==========
        function updateUIForSession() {
            if (currentSession) {
                authBlock.classList.add('hidden');
                userPanel.classList.remove('hidden');
                mainApp.classList.remove('hidden');
                const user = usersDB.find(u => u.login === currentSession.userLogin);
                displayUserSpan.innerText = user ? user.login : currentSession.userLogin;
                statusBadge.innerText = '⚡ сессия активна';
                initUserChats();
            } else {
                authBlock.classList.remove('hidden');
                userPanel.classList.add('hidden');
                mainApp.classList.add('hidden');
                statusBadge.innerText = '⚡ быстрый';
            }
        }

        function setActiveTab(tab) {
            if (tab === 'login') {
                btnLoginTab.classList.add('active');
                btnRegTab.classList.remove('active');
                loginFormDiv.classList.remove('hidden');
                registerFormDiv.classList.add('hidden');
            } else {
                btnLoginTab.classList.remove('active');
                btnRegTab.classList.add('active');
                loginFormDiv.classList.add('hidden');
                registerFormDiv.classList.remove('hidden');
            }
        }

        function addMessageToChat(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender === 'user' ? 'user-message' : 'ai-message');
            msgDiv.innerText = text;
            chatWindow.appendChild(msgDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }

        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.classList.add('typing-indicator');
            indicator.id = 'typingIndicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';
            chatWindow.appendChild(indicator);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        // ========== ФОТО ==========
        async function analyzeImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    const base64Image = e.target.result.split(',')[1];
                    try {
                        const response = await fetch('https://text.pollinations.ai/openai/', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                messages: [{
                                    role: 'user',
                                    content: [
                                        { type: "text", text: "Опиши это изображение кратко, используя эмодзи. Что ты видишь?" },
                                        { type: "image_url", image_url: { url: `data:image/jpeg;base64,${base64Image}` } }
                                    ]
                                }],
                                model: 'openai',
                                temperature: 0.8,
                                max_tokens: 300
                            })
                        });
                        const data = await response.json();
                        const description = data.choices?.[0]?.message?.content || '🔍 Не могу описать изображение';
                        resolve(description);
                    } catch (error) {
                        resolve('🔍 Ошибка при анализе изображения, но я вижу, что это фото!');
                    }
                };
                reader.readAsDataURL(file);
            });
        }

        photoUploadBtn.addEventListener('click', () => photoInput.click());

        photoInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const userMessage = '📷 Отправил(а) фото';
            addMessageToChat(userMessage, 'user');
            addMessageToCurrentChat('user', userMessage);
            showTypingIndicator();
            const description = await analyzeImage(file);
            removeTypingIndicator();
            const aiResponse = `📸 Описание фото: ${description}`;
            addMessageToChat(aiResponse, 'ai');
            addMessageToCurrentChat('assistant', aiResponse);
            photoInput.value = '';
        });

        // ========== AI ==========
        async function callFastAI(userPrompt) {
            if (!currentSession || !currentChatId) return;
            addMessageToCurrentChat('user', userPrompt);

            let modeInstruction = currentMode === 'search' 
                ? ' Ты в режиме поиска. Приведи актуальную информацию, можно упомянуть источники, используй эмодзи.'
                : ' Ты в режиме общения. Отвечай с эмодзи, тепло и с учётом истории.';

            const userChats = chats[currentSession.userLogin] || [];
            const currentChat = userChats.find(c => c.id === currentChatId);
            const chatHistory = currentChat ? currentChat.messages.slice(-10) : [];

            const messagesForAPI = [
                { role: 'system', content: SYSTEM_PROMPT.content + modeInstruction },
                ...chatHistory
            ];

            try {
                const response = await fetch('https://text.pollinations.ai/openai/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: messagesForAPI,
                        model: 'openai',
                        temperature: 0.9,
                        max_tokens: 200
                    })
                });
                const data = await response.json();
                let reply = data.choices?.[0]?.message?.content || '😶 Не могу ответить сейчас.';
                if (!reply.match(/[\u{1F600}-\u{1F6FF}]/u)) {
                    reply += currentMode === 'chat' ? ' 😊' : ' 🌍';
                }
                addMessageToCurrentChat('assistant', reply);
                return reply;
            } catch (error) {
                let fallback = '🔮 Я пока в офлайн, но помню наш разговор. ';
                fallback += currentMode === 'chat' ? 'Расскажи ещё что-нибудь ☺️' : 'Поиск временно недоступен 🌐';
                addMessageToCurrentChat('assistant', fallback);
                return fallback;
            }
        }

        async function handleSend() {
            if (!currentSession) { alert('Сначала войдите.'); return; }
            const text = userInput.value.trim();
            if (text === '') return;

            addMessageToChat(text, 'user');
            userInput.value = '';
            userInput.style.height = 'auto'; // сброс высоты textarea

            showTypingIndicator();
            const start = Date.now();
            const reply = await callFastAI(text);
            removeTypingIndicator();
            const elapsed = Date.now() - start;
            if (elapsed < 800) await new Promise(r => setTimeout(r, 400));
            addMessageToChat(reply, 'ai');
        }

        // ========== НОВЫЙ ЧАТ ==========
        newChatBtn.addEventListener('click', () => {
            if (!currentSession) return;
            const userLogin = currentSession.userLogin;
            const newChatId = Date.now().toString();
            const chatNumber = (chats[userLogin]?.length || 0) + 1;
            const newChat = {
                id: newChatId,
                name: `Чат ${chatNumber}`,
                messages: [{ role: 'assistant', content: 'Привет! Я ShmetAi, у меня есть память и эмоции 😊' }],
                created: Date.now()
            };
            if (!chats[userLogin]) chats[userLogin] = [];
            chats[userLogin].push(newChat);
            currentChatId = newChatId;
            saveChats();
            renderChatsList();
            loadCurrentChat();
        });

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        updateUIForSession();

        btnLoginTab.addEventListener('click', () => setActiveTab('login'));
        btnRegTab.addEventListener('click', () => setActiveTab('register'));

        registerAction.addEventListener('click', () => {
            const email = regEmail.value.trim();
            const login = regLogin.value.trim();
            const pass = regPassword.value.trim();
            if (!email || !login || !pass) { alert('Заполните всё'); return; }
            if (pass.length !== 6 || !/^\d+$/.test(pass)) { alert('Пароль -- 6 цифр'); return; }
            if (usersDB.find(u => u.login === login || u.email === email)) { alert('Уже есть'); return; }
            usersDB.push({ email, login, password: pass });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(usersDB));
            alert('Регистрация готова, войдите.');
            setActiveTab('login');
            regEmail.value = ''; regLogin.value = ''; regPassword.value = '';
        });

        loginAction.addEventListener('click', () => {
            const identifier = loginIdentifier.value.trim();
            const pass = loginPassword.value.trim();
            const user = usersDB.find(u => (u.login === identifier || u.email === identifier) && u.password === pass);
            if (user) {
                currentSession = { userLogin: user.login };
                localStorage.setItem(SESSION_KEY, JSON.stringify(currentSession));
                updateUIForSession();
            } else {
                alert('Неверно. Попробуй demo / 123456');
            }
        });

        logoutBtn.addEventListener('click', () => {
            currentSession = null;
            localStorage.removeItem(SESSION_KEY);
            updateUIForSession();
        });

        modeChatBtn.addEventListener('click', () => {
            currentMode = 'chat';
            modeChatBtn.classList.add('active-mode');
            modeSearchBtn.classList.remove('active-mode');
            modeHint.innerText = 'ShmetAi by Veltrix App • режим: общение';
        });
        modeSearchBtn.addEventListener('click', () => {
            currentMode = 'search';
            modeSearchBtn.classList.add('active-mode');
            modeChatBtn.classList.remove('active-mode');
            modeHint.innerText = 'ShmetAi by Veltrix App • режим: поиск';
        });

        sendBtn.addEventListener('click', handleSend);

        // Textarea auto-resize + enter send (shift+enter new line)
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Принудительный скролл при загрузке
        window.addEventListener('load', () => scrollToBottom());
    })();
</script>
</body>
</html>
